<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
  <title>Blog preview card</title>

  <!-- stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">

</head>

<body>
  <main>
    <article class="preview-card">
      <img class="preview-card__img" src="assets/images/illustration-article.svg" alt="Abstract geometric illustration">
      <span class="preview-card__category">Learning</span>

      <p class="preview-card__timeline">
        Published <time datetime="2023-12-21">21 Dec 2023</time>
      </p>


      <h1 class="preview-card__title">HTML & CSS foundations</h1>

      <p class="preview-card__description">
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>

      <footer class="preview-card__author">
        <img class="preview-card__avatar" src="assets/images/image-avatar.webp" alt="">
        <span class="preview-card__author-name">Greg Hooper</span>
      </footer>
    </article>
  </main>

  <footer class="attribution">
    <p>
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a> Coded by Vinayak Kamble.
    </p>
  </footer>
</body>

</html>
